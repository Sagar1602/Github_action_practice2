name: build_workflow
on: 
  push:
    branches: [main, dev] 

jobs:
  first_job:
    runs-on: ubuntu-latest
    steps:
      - name: code checkout
        uses: actions/checkout@v4
          
      - name: setup nodeJS
        uses: actions/setup-node@v4
        with:
           node-version: 18
           cache: 'npm'

      - name: install dependecies
        run: npm ci

      - name: lint
        run: npm run lint

      - name: test
        run: npm test

      - name: build the code
        run: npm run build

      - name: storing the artifact
        uses: actions/upload-artifact@v4
        with:
           name: dist
           path: dist/ 
           retention-days: 5        
      - name: successfull message 
        run: echo "the application is build is successfully"            
